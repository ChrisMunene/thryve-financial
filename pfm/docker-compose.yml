services:
  api:
    build: .
    command: python -m app.run_api --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  celery-worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pfm
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
